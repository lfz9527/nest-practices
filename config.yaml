# 环境配置

# 当前环境
env: development

# 服务端口
port: 3000

# MySQL 数据库连接
database:
  # 数据库主机
  host: localhost
  # 数据库端口
  port: 3306
  # 数据库用户名
  username: root
  # 数据库密码
  password: 'root'
  # 数据库名
  database: nest_practices

# 日志
logger:
  # 开发期 true 经 pino-pretty 输出可读日志；生产环境置 false 保持 JSON 到 stdout
  pretty: true
